<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tamper Ai</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="shell">
    <header>
      <div class="brand"><span class="mark">✦</span><span>TAMPER</span><small>AI</small></div>
      <span id="connection" class="pill">checking…</span>
    </header>
    <section class="hero">
      <p class="eyebrow">PRIVATE BROWSER COPILOT</p>
      <h1>Your local AI, everywhere you browse.</h1>
      <p class="sub">Powered by LM Studio on your own machine.</p>
    </section>
    <section class="actions">
      <button id="openWorkspace" class="primary">Open Tamper Ai workspace <span>↗</span></button>
      <button id="attachPage" class="tile"><span class="tileIcon">◫</span><span><b>Attach this page</b><small>Read it only when you choose</small></span></button>
      <button id="enableSelection" class="tile"><span class="tileIcon">✎</span><span><b>Enable selection tools</b><small>Ask, explain, summarize, rewrite</small></span></button>
    </section>
    <section class="quick">
      <p>Quick start</p>
      <div class="chips">
        <button data-prompt="Give me the important parts of this page.">Page briefing</button>
        <button data-prompt="Explain this simply, but do not oversimplify.">Explain it</button>
        <button data-prompt="Turn this into clean notes with headings and bullets.">Make notes</button>
      </div>
    </section>
    <footer><span id="modelLabel">LM Studio</span><button id="openSettings">Settings</button></footer>
  </main>
  <script src="popup.js"></script>
</body>
</html>
